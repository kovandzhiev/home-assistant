esphome:
  name: wet-room
  friendly_name: wet-room

esp8266:
  board: esp01_1m

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "2yo0FCbkjZwgaIp78c6OHvAfmsXJkPFj3f/xCArzULY="

ota:
  - platform: esphome
    password: "3667d4eda875201743b72efc11129f13"

wifi:
  min_auth_mode: WPA2
  networks:
  - ssid: !secret wifi_ssid
    password: !secret wifi_password
    hidden: true

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Wet-Room Fallback Hotspot"
    password: "xz8Ah2QiNjsm"
    ap_timeout: 150s

captive_portal:

# PRODINo WIFI-ESP WROOM-02 V1 settings
globals: # Create global variable to be used later on
  - id: is_night_time # Store state of day (false) or night (true)
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: light_count
    type: int
    initial_value: '0'

spi:
  clk_pin: GPIO14
  mosi_pin: GPIO13
  miso_pin: GPIO12

mcp23s08:
  - id: mcp23s08_hub
    cs_pin: GPIO15
    deviceaddress: 0

switch:
  - platform: template
    id: night_time
    name: "Night switch"
    lambda: |-
      return id(is_night_time);
    turn_on_action:
      - logger.log: "Night time swithch is on"
      - light.control:
          id: main_light
          brightness: 50%
      - lambda: |-
          id(is_night_time) = true; // Night time is set
    turn_off_action:
      - logger.log: "Night time swithch is off"
      - light.control:
          id: main_light
          brightness: 100%
      - lambda: |-
          id(is_night_time) = false; // Day time is set

  - platform: gpio
    id: relay_fan
    name: "Fan"
    pin:
      mcp23xxx: mcp23s08_hub
      number: 4
      mode: OUTPUT
      inverted: False

  - platform: gpio
    id: relay2
    name: "RELAY2"
    internal: true
    pin:
      mcp23xxx: mcp23s08_hub
      number: 5
      mode: OUTPUT
      inverted: False

  - platform: gpio
    id: relay3
    name: "RELAY3"
    internal: true
    pin:
      mcp23xxx: mcp23s08_hub
      number: 6
      mode: OUTPUT
      inverted: False

  - platform: gpio
    id: relay4
    name: "RELAY4"
    internal: true
    pin:
      mcp23xxx: mcp23s08_hub
      number: 7
      mode: OUTPUT
      inverted: False

binary_sensor:
  - platform: gpio
    id: pir_sensor
    name: "PIR Sensor"
    internal: True
    pin:
      mcp23xxx: mcp23s08_hub
      number: 0
      mode: INPUT
      inverted: True
    on_state:
      - script.execute: light_timer

  - platform: gpio
    id: door_sensor
    name: "Door Sensor"
    internal: False
    pin:
      mcp23xxx: mcp23s08_hub
      number: 1
      mode: INPUT
      inverted: True
    on_state:
      - script.execute: light_timer

  - platform: gpio
    id: fan_button
    name: "Fan Button"
    internal: True
    pin:
      mcp23xxx: mcp23s08_hub
      number: 2
      mode: INPUT
      inverted: True
    on_press:
      - script.execute: fan_timer

  - platform: gpio
    id: input4
    name: "INPUT4"
    internal: True
    pin:
      mcp23xxx: mcp23s08_hub
      number: 3
      mode: INPUT
      inverted: True

# >>> Wet-room devices logic
output:
  - platform: esp8266_pwm
    id: pwm_light
    pin: GPIO5
    frequency: 1000 Hz

light:
  - platform: monochromatic
    name: "Main Light"
    id: main_light
    output: pwm_light
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - script.execute: light_timer

script:
  - id: light_timer
    mode: restart
    then:
      - light.turn_on:
          id: main_light
          transition_length: 3s
      - delay: 1min
      - light.turn_off:
          id: main_light
          transition_length: 30s

  - id: fan_timer
    mode: restart
    then:
      - switch.turn_on: relay_fan
      - delay: 30min
      - switch.turn_off: relay_fan

sensor:
# Room themperature and humidity. DHT22 sensor
  - platform: dht
    pin: GPIO4
    temperature:
      name: "Temperature"
      id: currentTemperature
      filters:
        - calibrate_linear:
            method: least_squares
            datapoints:
              # Map 0.0 (from sensor) to 1.0 (true value) MEASURED -> TRUTH
              - 0.0 -> 0.0
              - 22.0 -> 22.0
        - sliding_window_moving_average:
            window_size: 10
            send_every: 1
    humidity:
      name: "Humidity"
      id: currentHumidity
      filters:
        - sliding_window_moving_average:
            window_size: 10
            send_every: 1
    update_interval: 30s

interval:
  - interval: 1min
    then:
      - lambda: |-
          // Check if the light is ON
          if (id(main_light).current_values.is_on()) {
            id(light_count)++;
            ESP_LOGI("interval", "Light is ON -> light_count = %d", id(light_count));
          } else {
            id(light_count) = 0;
            ESP_LOGI("interval", "Light is OFF -> light_count reset");
          }

          // Is light is being ON more than or equal 5 minutes start fan
          if (id(light_count) >= 5) {
            ESP_LOGI("interval", "Light ON >= 5min -> Starting fan_timer");
            id(light_count) = 0;
            id(fan_timer).execute();
          }

          // Checking humidity
          if (id(currentHumidity).state > 70.0) {
            ESP_LOGI("interval", "Humidity %.1f%% > 70%% -> Starting fan_timer", id(currentHumidity).state);
            id(fan_timer).execute();
          }
