# PRODINo WIFI-ESP WROOM-02 V1 settings
globals: # Create global variable to be used later on
  - id: is_night_time # Store state of day (false) or night (true)
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: is_external_power # Store state of external power (true = available)
    type: bool
    restore_value: no
    initial_value: 'true'
  - id: light_count
    type: int
    initial_value: '0'

spi:
  clk_pin: GPIO14
  mosi_pin: GPIO13
  miso_pin: GPIO12

mcp23s08:
  - id: mcp23s08_hub
    cs_pin: GPIO15
    deviceaddress: 0

switch:
  - platform: template
    id: night_time
    name: "Night switch"
    lambda: |-
      return id(is_night_time);
    turn_on_action:
      - logger.log: "Night time switch is on"
      - lambda: |-
          id(is_night_time) = true;
      - script.execute: update_brightness
    turn_off_action:
      - logger.log: "Night time switch is off"
      - lambda: |-
          id(is_night_time) = false;
      - script.execute: update_brightness

  - platform: template
    id: external_power
    name: "External power switch"
    lambda: |-
      return id(is_external_power);
    turn_on_action:
      - logger.log: "External power switch is on"
      - lambda: |-
          id(is_external_power) = true;
      - script.execute: update_brightness
    turn_off_action:
      - logger.log: "External power switch is off"
      - lambda: |-
          id(is_external_power) = false;
      - script.execute: update_brightness

  - platform: gpio
    id: relay_fan
    name: "Fan"
    pin:
      mcp23xxx: mcp23s08_hub
      number: 4
      mode: OUTPUT
      inverted: False

  - platform: gpio
    id: relay_busy_light
    name: "Busy Light"
    pin:
      mcp23xxx: mcp23s08_hub
      number: 5
      mode: OUTPUT
      inverted: False

  - platform: gpio
    id: relay3
    name: "RELAY3"
    internal: true
    pin:
      mcp23xxx: mcp23s08_hub
      number: 6
      mode: OUTPUT
      inverted: False

  - platform: gpio
    id: relay4
    name: "RELAY4"
    internal: true
    pin:
      mcp23xxx: mcp23s08_hub
      number: 7
      mode: OUTPUT
      inverted: False

binary_sensor:
  - platform: gpio
    id: pir_sensor
    name: "PIR Sensor"
    internal: true
    pin:
      mcp23xxx: mcp23s08_hub
      number: 0
      mode: INPUT
      inverted: True
    on_state:
      - script.execute: light_timer

  - platform: gpio
    id: door_sensor
    name: "Door Sensor"
    internal: true
    pin:
      mcp23xxx: mcp23s08_hub
      number: 1
      mode: INPUT
      inverted: True
  #   on_press:

  - platform: gpio
    id: fan_button
    name: "Fan Button"
    internal: true
    pin:
      mcp23xxx: mcp23s08_hub
      number: 2
      mode: INPUT
      inverted: True
    on_press:
      - script.execute: fan_timer

  - platform: gpio
    id: input4
    name: "INPUT4"
    internal: true
    pin:
      mcp23xxx: mcp23s08_hub
      number: 3
      mode: INPUT
      inverted: True

# >>> Tiolet devices logic
output:
  - platform: esp8266_pwm
    id: pwm_light
    pin: GPIO5
    frequency: 1000 Hz

light:
  - platform: monochromatic
    name: "Main Light"
    id: main_light
    output: pwm_light
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - script.execute: light_timer

script:
  - id: update_brightness
    then:
      - lambda: |-
          float night_br = id(is_night_time) ? 0.5 : 1.0;
          float ext_br = id(is_external_power) ? 1.0 : 0.5;
          float brightness = (night_br < ext_br) ? night_br : ext_br;
          auto call = id(main_light).make_call();
          call.set_brightness(brightness);
          call.perform();

  - id: light_timer
    mode: restart
    then:
      - switch.turn_on: relay_busy_light
      - light.turn_on:
          id: main_light
          transition_length: 3s
      - delay: 2min #10s
      - light.turn_off:
          id: main_light
          transition_length: 60s #10s
      - switch.turn_off: relay_busy_light

  - id: fan_timer
    mode: restart
    then:
      - switch.turn_on: relay_fan
      - delay: 20min # 30min
      - switch.turn_off: relay_fan

interval:
  - interval: 1min
    then:
      - lambda: |-
          // Check if the light is ON
          if (id(main_light).current_values.is_on()) {
            id(light_count)++;
            ESP_LOGI("interval", "Light is ON -> light_count = %d", id(light_count));
          } else {
            id(light_count) = 0;
            ESP_LOGI("interval", "Light is OFF -> light_count reset");
          }

          // Is light is being ON more than or equal 5 minutes start fan
          if (id(light_count) >= 5) {
            ESP_LOGI("interval", "Light ON >= 5min -> Starting fan_timer");
            id(light_count) = 0;
            id(fan_timer).execute();
          }
