# Баня
esphome:
  name: bathroom
  friendly_name: bathroom

esp8266:
  board: esp_wroom_02
  restore_from_flash: True
  framework: 
    version: recommended

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "QnARw9/sTg/sbX8umHHw2qfzJgWjQAp86DO+YBs4PT8="

ota:
  - platform: esphome
    password: "e26c5a143f596afdc488745a4a384d55"

wifi:
  min_auth_mode: WPA2
  networks:
  - ssid: !secret wifi_ssid
    password: !secret wifi_password
    hidden: true

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Bathroom Fallback Hotspot"
    password: "GvC05x4qucdc"
    ap_timeout: 150s

captive_portal:

# PRODINo WIFI-ESP WROOM-02 V1 settings
globals: # Create global variable to be used later on
  - id: is_night_time # Store state of day (false) or night (true)
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: is_external_power # Store state of external power (true = available)
    type: bool
    restore_value: no
    initial_value: 'true'
  - id: light_count
    type: int
    initial_value: '0'
  - id: bypass_state # Store last bypass state
    type: bool
    restore_value: yes # Memorize the last state after restart

spi:
  clk_pin: GPIO14
  mosi_pin: GPIO13
  miso_pin: GPIO12

mcp23s08:
  - id: mcp23s08_hub
    cs_pin: GPIO15
    deviceaddress: 0

switch:
  - platform: template
    id: night_time
    name: "Night switch"
    lambda: |-
      return id(is_night_time);
    turn_on_action:
      - logger.log: "Night time switch is on"
      - lambda: |-
          id(is_night_time) = true;
      - script.execute: update_brightness
    turn_off_action:
      - logger.log: "Night time switch is off"
      - lambda: |-
          id(is_night_time) = false;
      - script.execute: update_brightness

  - platform: template
    id: external_power
    name: "External power switch"
    lambda: |-
      return id(is_external_power);
    turn_on_action:
      - logger.log: "External power switch is on"
      - lambda: |-
          id(is_external_power) = true;
      - script.execute: update_brightness
    turn_off_action:
      - logger.log: "External power switch is off"
      - lambda: |-
          id(is_external_power) = false;
      - script.execute: update_brightness

  - platform: gpio
    id: relay_fan
    name: "Fan"
    pin:
      mcp23xxx: mcp23s08_hub
      number: 4
      mode: OUTPUT
      inverted: False

  - platform: gpio
    id: relay_busy_light
    name: "Busy Light"
    pin:
      mcp23xxx: mcp23s08_hub
      number: 5
      mode: OUTPUT
      inverted: False

  # Bypass control
  - platform: gpio
    id: bypass_on
    internal: true
    interlock: [bypass_off]
    interlock_wait_time: 500ms
    pin:
      mcp23xxx: mcp23s08_hub
      number: 6
      mode: OUTPUT
      inverted: False
    on_turn_on:
      - globals.set:
          id: bypass_state
          value: 'true'
      - delay: 10s
      - switch.turn_off: bypass_on

  - platform: gpio
    id: bypass_off
    internal: true
    pin:
      mcp23xxx: mcp23s08_hub
      number: 7
      mode: OUTPUT
      inverted: False
    interlock: [bypass_on]
    interlock_wait_time: 500ms
    on_turn_on:
      - globals.set:
          id: bypass_state
          value: 'false'
      - delay: 10s
      - switch.turn_off: bypass_off

  # Virtual bypass
  - platform: template
    name: "Bypass"
    id: bypass
    restore_mode: DISABLED
    optimistic: false
    lambda: |-
      return id(bypass_state);
    turn_on_action:
      - switch.turn_on: bypass_on
    turn_off_action:
      - switch.turn_on: bypass_off

binary_sensor:
  - platform: gpio
    id: pir_sensor
    name: "PIR Sensor"
    internal: true
    pin:
      mcp23xxx: mcp23s08_hub
      number: 0
      mode: INPUT
      inverted: True
    on_state:
      - script.execute: light_timer

  - platform: gpio
    id: door_sensor
    name: "Door Sensor"
    internal: False
    pin:
      mcp23xxx: mcp23s08_hub
      number: 1
      mode: INPUT
      inverted: True
    on_state:
      - script.execute: light_timer

  - platform: gpio
    id: fan_button
    name: "Fan Button"
    internal: true
    pin:
      mcp23xxx: mcp23s08_hub
      number: 2
      mode: INPUT
      inverted: True
    on_press:
      - script.execute: fan_timer

  - platform: gpio
    id: input4
    name: "INPUT4"
    internal: true
    pin:
      mcp23xxx: mcp23s08_hub
      number: 3
      mode: INPUT
      inverted: True

# >>> Bathroom devices logic
output:
  - platform: esp8266_pwm
    id: pwm_light
    pin: GPIO5
    frequency: 1000 Hz

light:
  - platform: monochromatic
    name: "Main Light"
    id: main_light
    output: pwm_light
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - switch.turn_on: relay_busy_light
    on_turn_off: 
      - switch.turn_off: relay_busy_light

script:
  - id: update_brightness
    then:
      - lambda: |-
          float night_br = id(is_night_time) ? 0.5 : 1.0;
          float ext_br = id(is_external_power) ? 1.0 : 0.5;
          float brightness = (night_br < ext_br) ? night_br : ext_br;
          auto call = id(main_light).make_call();
          call.set_brightness(brightness);
          call.perform();

  - id: light_timer
    mode: restart
    then:
      - light.turn_on:
          id: main_light
          transition_length: 3s
      - delay: 1min
      - light.turn_off:
          id: main_light
          transition_length: 30s

  - id: fan_timer
    mode: restart
    then:
      - switch.turn_on: relay_fan
      - delay: 10min # 30min
      - switch.turn_off: relay_fan

sensor:
# Room themperature and humidity. DHT22 sensor
  - platform: dht
    pin: GPIO4
    temperature:
      name: "Temperature"
      id: currentTemperature
      filters:
        - calibrate_linear:
            method: least_squares
            datapoints:
              # Map 0.0 (from sensor) to 1.0 (true value) MEASURED -> TRUTH
              - 0.0 -> 0.0
              - 23.0 -> 22.2
        - sliding_window_moving_average:
            window_size: 10
            send_every: 1
    humidity:
      name: "Humidity"
      id: currentHumidity
      filters:
        - sliding_window_moving_average:
            window_size: 10
            send_every: 1
    update_interval: 30s

interval:
  - interval: 1min
    then:
      - lambda: |-
          // Check if the light is ON
          if (id(main_light).current_values.is_on()) {
            id(light_count)++;
            ESP_LOGI("interval", "Light is ON -> light_count = %d", id(light_count));
          } else {
            id(light_count) = 0;
            ESP_LOGI("interval", "Light is OFF -> light_count reset");
          }

          // Is light is being ON more than or equal 6 minutes start fan
          if (id(light_count) >= 6) {
            ESP_LOGI("interval", "Light ON >= 5min -> Starting fan_timer");
            id(light_count) = 0;
            id(fan_timer).execute();
          }

          // Checking humidity
          if (id(currentHumidity).state > 70.0) {
            ESP_LOGI("interval", "Humidity %.1f%% > 70%% -> Starting fan_timer", id(currentHumidity).state);
            id(fan_timer).execute();
          }
