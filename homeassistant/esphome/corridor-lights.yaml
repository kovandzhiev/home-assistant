# Коридор осветление
esphome:
  name: corridor-lights
  friendly_name: Corridor lights

esp8266:
  board: esp_wroom_02
  restore_from_flash: True
  framework: 
    version: recommended

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "Q3jtHxFLs8BXPTuvLeuLGrVDh7b/mmfk4S3Oc37/TDc="

ota:
  - platform: esphome
    password: "101cfdcc0e37fc4169a89da645954015"

wifi:
  min_auth_mode: WPA2
  networks:
  - ssid: !secret wifi_ssid
    password: !secret wifi_password
    hidden: true

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Corridor-Lights Fallback Hotspot"
    password: "8d8zwQaqNhe7"
    ap_timeout: 150s

captive_portal:

# PRODINo WIFI-ESP WROOM-02 V1 settings
globals: # Create global variable to be used later on
  - id: is_night_time # Store state of day (false) or night (true)
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: is_external_power # Store state of external power (true = available)
    type: bool
    restore_value: no
    initial_value: 'true'

spi:
  clk_pin: GPIO14
  mosi_pin: GPIO13
  miso_pin: GPIO12

mcp23s08:
  - id: mcp23s08_hub
    cs_pin: GPIO15
    deviceaddress: 0

switch:
  - platform: template
    id: night_time
    name: "Night switch"
    lambda: |-
      return id(is_night_time);
    turn_on_action:
      - logger.log: "Night time switch is on"
      - lambda: |-
          id(is_night_time) = true;
      - script.execute: update_brightness
    turn_off_action:
      - logger.log: "Night time switch is off"
      - lambda: |-
          id(is_night_time) = false;
      - script.execute: update_brightness

  - platform: template
    id: external_power
    name: "External power switch"
    lambda: |-
      return id(is_external_power);
    turn_on_action:
      - logger.log: "External power switch is on"
      - lambda: |-
          id(is_external_power) = true;
      - script.execute: update_brightness
    turn_off_action:
      - logger.log: "External power switch is off"
      - lambda: |-
          id(is_external_power) = false;
      - script.execute: update_brightness

  - platform: gpio
    id: small_lamp_relay
    name: "Small lamps relay"
    pin:
      mcp23xxx: mcp23s08_hub
      number: 4
      mode: OUTPUT
      inverted: False

  - platform: gpio
    id: relay2
    name: "RELAY2"
    internal: true
    pin:
      mcp23xxx: mcp23s08_hub
      number: 5
      mode: OUTPUT
      inverted: False

  - platform: gpio
    id: relay3
    name: "RELAY3"
    internal: true
    pin:
      mcp23xxx: mcp23s08_hub
      number: 6
      mode: OUTPUT
      inverted: False

  - platform: gpio
    id: relay4
    name: "RELAY4"
    internal: true
    pin:
      mcp23xxx: mcp23s08_hub
      number: 7
      mode: OUTPUT
      inverted: False

binary_sensor:
  - platform: gpio
    id: pir_sensor_short
    name: "PIR Sensor short"
    internal: true
    pin:
      mcp23xxx: mcp23s08_hub
      number: 0
      mode: INPUT
      inverted: True
    on_state:
      - script.execute: light_timer

  - platform: gpio
    id: pir_sensor_long
    name: "PIR Sensor long"
    internal: true
    pin:
      mcp23xxx: mcp23s08_hub
      number: 1
      mode: INPUT
      inverted: True
    on_state:
      - script.execute: light_timer

  - platform: gpio
    id: input3
    name: "INPUT3"
    internal: true
    pin:
      mcp23xxx: mcp23s08_hub
      number: 2
      mode: INPUT
      inverted: True

  - platform: gpio
    id: input4
    name: "INPUT4"
    internal: true
    pin:
      mcp23xxx: mcp23s08_hub
      number: 3
      mode: INPUT
      inverted: True

# >>> Corrodor devices logic
output:
  - platform: esp8266_pwm
    id: pwm_light
    pin: GPIO5
    frequency: 1000 Hz

light:
  - platform: monochromatic
    name: "Main Light"
    id: main_light
    output: pwm_light
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - script.execute: light_timer

script:
  - id: update_brightness
    then:
      - lambda: |-
          // Night ON = 50%, OFF = 100%; External Power ON = 100%, OFF = 50%
          // The lower brightness wins
          float night_br = id(is_night_time) ? 0.5 : 1.0;
          float ext_br = id(is_external_power) ? 1.0 : 0.5;
          float brightness = (night_br < ext_br) ? night_br : ext_br;
          auto call = id(main_light).make_call();
          call.set_brightness(brightness);
          call.perform();

          // Small lamp relay: ON when brightness < 100%, OFF at 100%
          if (brightness < 1.0) {
            id(small_lamp_relay).turn_on();
          } else {
            id(small_lamp_relay).turn_off();
          }

  - id: light_timer
    mode: restart
    then:
      - logger.log: "Light timer is started"
      - light.turn_on:
          id: main_light
          transition_length: 3s
      - delay: 2min #10s
      - light.turn_off:
          id: main_light
          transition_length: 60s #10s