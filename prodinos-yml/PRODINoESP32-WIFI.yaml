esphome:
  name: prodinoesp32ethernet
  friendly_name: PRODINoESP32Ethernet

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "fbyiLcKs4iTJeasdi7ybDeOJifD8XJJ6BxieoUDSnuY="

ota:
  platform: esphome
  password: "618bb1fff196b29a94b17920da838a30"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Prodinoesp32Ethernet"
    password: "7wO0tXVkU4mV"

captive_portal:

web_server:
  port: 80
  auth:
    username: "dantonov"
    password: "y00mcwvEqvbp"
    
spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23
  miso_pin: GPIO19
    
mcp23s08:
  - id: 'mcp23s08_hub'
    cs_pin: GPIO32
    deviceaddress: 0
# Individual outputs
switch:
  - platform: gpio
    name: "RELAY4"
    pin:
      mcp23xxx: mcp23s08_hub
      # Use pin number 4
      number: 4
      mode: OUTPUT
      inverted: False

  - platform: gpio
    name: "RELAY3"     
    pin:
      mcp23xxx: mcp23s08_hub
      # Use pin number 5
      number: 5
      mode: OUTPUT
      inverted: False 
      
  - platform: gpio
    name: "RELAY2"     
    pin:
      mcp23xxx: mcp23s08_hub
      # Use pin number 6
      number: 6
      mode: OUTPUT
      inverted: False 
      
  - platform: gpio
    name: "RELAY1"     
    pin:
      mcp23xxx: mcp23s08_hub
      # Use pin number 7
      number: 7
      mode: OUTPUT
      inverted: False 
      
binary_sensor:
  - platform: gpio
    name: "INPUT1"
    pin:
      mcp23xxx: mcp23s08_hub
      # Use pin number 3
      number: 3
      # One of INPUT or INPUT_PULLUP
      mode: INPUT
      inverted: True
      
  - platform: gpio
    name: "INPUT2"
    pin:
      mcp23xxx: mcp23s08_hub
      # Use pin number 2
      number: 2
      # One of INPUT or INPUT_PULLUP
      mode: INPUT
      inverted: True
      
  - platform: gpio
    name: "INPUT3"
    pin:
      mcp23xxx: mcp23s08_hub
      # Use pin number 1
      number: 1
      # One of INPUT or INPUT_PULLUP
      mode: INPUT
      inverted: True
      
  - platform: gpio
    name: "INPUT4"
    pin:
      mcp23xxx: mcp23s08_hub
      # Use pin number 0
      number: 0
      # One of INPUT or INPUT_PULLUP
      mode: INPUT
      inverted: True
   
light:
  - platform: neopixelbus
    type: GRB
    variant: WS2812X
    pin: GPIO0
    num_leds: 1
    name: "NeoPixel Light"     
    